<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控</title>
    <link rel="stylesheet" href="/static/css/monitor.css">
</head>
<body>
    <div class="monitor-container">
        <div class="camera-info">
            <span id="cameraName">摄像头名称</span>
        </div>
        
        <div class="video-container">
            <img id="videoFrame" alt="监控画面" />
        </div>
        
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p>正在连接摄像头...</p>
        </div>
        
        <div id="errorOverlay" class="error-overlay hidden">
            <div class="error-content">
                <h2>连接错误</h2>
                <p id="errorMessage">无法连接到摄像头</p>
                <button id="retryButton">重试</button>
            </div>
        </div>
    </div>
    
    <script src="/static/js/monitor.js"></script>
</body>
</html>
