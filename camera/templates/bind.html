<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄像头绑定</title>
    <link rel="stylesheet" href="/static/css/bind.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>摄像头绑定</h1>
        </div>
        
        <div class="form-container">
            <form id="bindForm">
                <div class="form-group">
                    <label for="cameraType">摄像头类型</label>
                    <select id="cameraType" name="cameraType" required>
                        <option value="">请选择摄像头类型</option>
                        <option value="usb">USB摄像头</option>
                        <option value="rtsp">网络摄像头</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="cameraName">摄像头名称</label>
                    <input type="text" id="cameraName" name="cameraName" maxlength="50" required>
                    <span class="error-message" id="cameraNameError"></span>
                </div>
                
                <div id="usbFields" class="camera-fields hidden">
                    <div class="form-group">
                        <label for="deviceIndex">设备索引</label>
                        <select id="deviceIndex" name="deviceIndex">
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>
                </div>
                
                <div id="rtspFields" class="camera-fields hidden">
                    <div class="form-group">
                        <label for="ipAddress">IP地址</label>
                        <input type="text" id="ipAddress" name="ipAddress" placeholder="192.168.1.100">
                        <span class="error-message" id="ipAddressError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="port">端口</label>
                        <input type="number" id="port" name="port" min="1" max="65535" value="554">
                        <span class="error-message" id="portError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username">
                        <span class="error-message" id="usernameError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password">
                        <span class="error-message" id="passwordError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="brand">摄像头品牌</label>
                        <select id="brand" name="brand">
                            <option value="">请选择品牌</option>
                            <option value="hikvision">海康威视</option>
                            <option value="dahua">大华</option>
                            <option value="axis">安讯士</option>
                            <option value="bosch">博世</option>
                            <option value="samsung">三星</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="model">型号</label>
                        <select id="model" name="model">
                            <option value="">请选择型号</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" id="bindButton" disabled>绑定摄像头</button>
                </div>
            </form>
        </div>
        
        <div id="successMessage" class="success-message hidden"></div>
        <div id="errorMessage" class="error-message hidden"></div>
    </div>
    
    <script src="/static/js/bind.js"></script>
</body>
</html>
